<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="956px" preserveAspectRatio="none" style="width:541px;height:956px;background:#FFFFFF;" version="1.1" viewBox="0 0 541 956" width="541px" zoomAndPan="magnify"><title>AI Requirements Analyzer &#8212; Pipeline Overview</title><defs/><g><g class="title" data-source-line="12"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="329.4888" x="104.574" y="34.9659">AI Requirements Analyzer &#8212; Pipeline Overview</text></g><ellipse cx="198.9238" cy="60.0679" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#C7ECFF" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="148.3409" x="124.7534" y="90.0679"/><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="128.3409" x="134.7534" y="112.896">receive &lt;doc&gt;.pdf spec</text><rect fill="#FFFFFF" height="101.7206" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="292.3885" x="52.7296" y="146.412"/><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="75.1205" x="65.8496" y="169.2401">(S0) Extractor</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="66.6365" x="68.9696" y="185.5842">I: &lt;doc&gt;.pdf</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="256.7884" x="75.2097" y="201.9283">1. PDF &#8594; raw text per page and file metadata,</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="185.1013" x="75.2097" y="218.2725">2. Page &amp; char limit enforcement</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="127.1769" x="68.9696" y="234.6166">O: 00_raw_extract.json</text><rect fill="#FFFFFF" height="101.7206" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="282.4418" x="57.7029" y="268.1326"/><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="86.6166" x="70.823" y="290.9607">(S1) Normalizer</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="121.8728" x="73.943" y="307.3048">I: 00_raw_extract.json</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="244.5617" x="80.183" y="323.6489">1. ligature replacement and dehyphenation</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="249.9617" x="80.183" y="339.993">2. LLM Identify item id and heading patterns</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="125.0649" x="73.943" y="356.3371">O: 01_normalized.json</text><polygon fill="#FEF0BD" points="32,396.558,365.8477,396.558,377.8477,426.5218,365.8477,456.4856,32,456.4856,20,426.5218,32,396.558" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="calibri" font-size="11" lengthAdjust="spacing" textLength="66.1865" x="32" y="408.3169">(S2) Preflight</text><text fill="#000000" font-family="calibri" font-size="11" lengthAdjust="spacing" textLength="109.7792" x="34.86" y="423.2988">I: 01_normalized.json</text><text fill="#000000" font-family="calibri" font-size="11" lengthAdjust="spacing" textLength="325.2677" x="37.72" y="438.2807">1.Computes: ID count, duplicate count, extraction-quality score</text><text fill="#000000" font-family="calibri" font-size="11" lengthAdjust="spacing" textLength="91.9044" x="34.86" y="453.2626">O: pass/fail status</text><text fill="#000000" font-family="calibri" font-size="11" lengthAdjust="spacing" textLength="15.6309" x="377.8477" y="393.3351">fail</text><text fill="#000000" font-family="calibri" font-size="11" lengthAdjust="spacing" textLength="119.7891" x="377.8477" y="408.3169">score &lt; 0.80 or &lt; 5 reqs</text><text fill="#000000" font-family="calibri" font-size="11" lengthAdjust="spacing" textLength="99.4503" x="380.7077" y="423.2988">emit user guidance</text><ellipse cx="519.6368" cy="426.5218" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="519.6368" cy="426.5218" fill="#000000" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="150.7529" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="359.5064" x="19.1706" y="476.4856"/><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="107.8327" x="32.2906" y="499.3137">(S3) LLM Structurer</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="119.7608" x="35.4107" y="515.6578">I: 01_normalized.json</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="278.582" x="41.6507" y="532.0019">1. Asks LLM to identify and provide item locations</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="226.9936" x="54.1308" y="548.346">(e.g. id: REQ-123 loc: [page: 1, lines: 3-6])</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="327.0263" x="41.6507" y="564.6901">2. Python resolves the locations, and validates the content</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="253.6098" x="41.6507" y="581.0343">3. Python computes items' hierarchy number</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="287.222" x="41.6507" y="597.3784">4. Python computes unique ids for change tracking</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="143.305" x="35.4107" y="613.7225">O: 03_llm_structured.json</text><rect fill="#FFFFFF" height="150.7529" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="363.7785" x="17.0346" y="647.2385"/><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="98.7487" x="30.1546" y="670.0666">(S4) LLM Analyzer</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="138.001" x="33.2746" y="686.4107">I: 03_llm_structured.json</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="300.7222" x="33.2746" y="702.7548">I: 01_normalized.json (full text for location resolution)</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="193.3694" x="39.5147" y="719.0989">1. Python resolves items' locations</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="331.2984" x="39.5147" y="735.4431">2. Python prepares relevant items and attributes for Pass 3</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="249.4338" x="39.5147" y="751.7872">3. LLM: Pass 3 - Requirements quality review</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="308.9783" x="39.5147" y="768.1313">4. Python: Collects flags, metadata and provides report</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="134.1249" x="33.2746" y="784.4754">O: 04_llm_analyzed.json</text><rect fill="#FFFFFF" height="85.3765" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="272.6138" x="62.6169" y="817.9914"/><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="76.2485" x="75.737" y="840.8195">(S5) Renderer</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="128.8209" x="78.857" y="857.1636">I: 04_llm_analyzed.json</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="240.1337" x="85.097" y="873.5077">1. Generates single-page HTML dashboard</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="126.3609" x="78.857" y="889.8519">O: 05_flag_report.html</text><ellipse cx="198.9238" cy="934.3679" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="198.9238" cy="934.3679" fill="#000000" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="198.9238" x2="198.9238" y1="70.0679" y2="90.0679"/><polygon fill="#181818" points="194.9238,80.0679,198.9238,90.0679,202.9238,80.0679,198.9238,84.0679" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="198.9238" x2="198.9238" y1="126.412" y2="146.412"/><polygon fill="#181818" points="194.9238,136.412,198.9238,146.412,202.9238,136.412,198.9238,140.412" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="198.9238" x2="198.9238" y1="248.1326" y2="268.1326"/><polygon fill="#181818" points="194.9238,258.1326,198.9238,268.1326,202.9238,258.1326,198.9238,262.1326" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="198.9238" x2="198.9238" y1="456.4856" y2="476.4856"/><polygon fill="#181818" points="194.9238,466.4856,198.9238,476.4856,202.9238,466.4856,198.9238,470.4856" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="377.8477" x2="508.6368" y1="426.5218" y2="426.5218"/><polygon fill="#181818" points="498.6368,422.5218,508.6368,426.5218,498.6368,430.5218,502.6368,426.5218" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="198.9238" x2="198.9238" y1="369.8532" y2="396.558"/><polygon fill="#181818" points="194.9238,386.558,198.9238,396.558,202.9238,386.558,198.9238,390.558" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#1818