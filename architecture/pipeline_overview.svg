<?plantuml 1.2026.2?><svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="ACTIVITY" height="713px" preserveAspectRatio="none" style="width:632px;height:713px;background:#FFFFFF;" version="1.1" viewBox="0 0 632 713" width="632px" zoomAndPan="magnify"><title>AI Requirements Analyzer &#8212; Pipeline Overview</title><defs/><g><g class="title" data-source-line="5"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="329.4888" x="150.0709" y="34.9659">AI Requirements Analyzer &#8212; Pipeline Overview</text></g><ellipse cx="250.813" cy="60.0679" fill="#FFFFFF" rx="10" ry="10" style="stroke:#000000;stroke-width:1;"/><rect fill="#C7ECFF" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="148.3409" x="176.6425" y="90.0679"/><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="128.3409" x="186.6425" y="112.896">receive &lt;doc&gt;.pdf spec</text><rect fill="#FFFFFF" height="69.0323" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="272.9484" x="114.3388" y="146.412"/><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="75.1205" x="127.4588" y="169.2401">(S0) Extractor</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="243.5883" x="130.5788" y="185.5842">PDF &#8594; raw text per page and file metadata,</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="163.8612" x="130.5788" y="201.9283">page+char limit enforcement</text><rect fill="#FFFFFF" height="69.0323" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="254.4576" x="123.5841" y="235.4444"/><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="86.6166" x="136.7042" y="258.2725">(S1) Normalizer</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="213.1455" x="139.8242" y="274.6166">ligature replacement, dehyphenation,</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="228.2176" x="139.8242" y="290.9607">item ID and heading pattern recognition</text><polygon fill="#FEF0BD" points="44.7844,339.4767,456.8415,339.4767,468.8415,354.4586,456.8415,369.4405,44.7844,369.4405,32.7844,354.4586,44.7844,339.4767" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="calibri" font-size="11" lengthAdjust="spacing" textLength="66.1865" x="44.7844" y="351.2356">(S2) Preflight</text><text fill="#000000" font-family="calibri" font-size="11" lengthAdjust="spacing" textLength="409.1971" x="47.6444" y="366.2175">gatekeeper logic (ID count, duplicate detection, messy content score threshold)</text><text fill="#000000" font-family="calibri" font-size="11" lengthAdjust="spacing" textLength="15.6309" x="468.8415" y="321.2719">fail</text><text fill="#000000" font-family="calibri" font-size="11" lengthAdjust="spacing" textLength="119.7891" x="468.8415" y="336.2537">score &lt; 0.80 or &lt; 5 reqs</text><text fill="#000000" font-family="calibri" font-size="11" lengthAdjust="spacing" textLength="99.4503" x="471.7015" y="351.2356">emit user guidance</text><ellipse cx="610.6306" cy="354.4586" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="610.6306" cy="354.4586" fill="#000000" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><rect fill="#FFFFFF" height="69.0323" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="479.6259" x="11" y="389.4405"/><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="107.8327" x="24.12" y="412.2686">(S3) LLM Structurer</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="377.4853" x="27.2401" y="428.6127">text &#8594; uses llm to identify structure (items, headings and locations)</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="453.3859" x="27.2401" y="444.9568">&#8594; python resolves the locations, validates the content and generates internal ids</text><rect fill="#FFFFFF" height="52.6882" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="228.7895" x="136.4182" y="478.4728"/><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="98.7487" x="149.5382" y="501.3009">(S4) LLM Analyzer</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="202.5495" x="152.6582" y="517.645">assess quality, completeness, safety</text><rect fill="#FFFFFF" height="52.6882" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="142.3995" x="179.6132" y="551.1611"/><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="76.2485" x="192.7332" y="573.9892">(S5) Renderer</text><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="116.1595" x="195.8533" y="590.3333">JSON &#8594; HTML report</text><rect fill="#D1EECF" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="179.3971" x="161.1144" y="623.8493"/><text fill="#000000" font-family="calibri" font-size="12" lengthAdjust="spacing" textLength="159.3971" x="171.1144" y="646.6774">deliver 05_report&lt;doc&gt;.html</text><ellipse cx="250.813" cy="691.1934" fill="none" rx="11" ry="11" style="stroke:#000000;stroke-width:1;"/><ellipse cx="250.813" cy="691.1934" fill="#000000" rx="6" ry="6" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#181818;stroke-width:1;" x1="250.813" x2="250.813" y1="70.0679" y2="90.0679"/><polygon fill="#181818" points="246.813,80.0679,250.813,90.0679,254.813,80.0679,250.813,84.0679" style="stroke:#181818;stroke-width:1;"/><line style="stroke:#181818;stroke-wid